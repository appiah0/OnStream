<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0505"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2020"/>
      <stop offset="100%" style="stop-color:#b00000"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#e50914" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glow circle -->
  <circle cx="256" cy="230" r="140" fill="#e50914" opacity="0.08"/>
  <!-- Play triangle -->
  <polygon points="185,155 185,305 355,230" fill="url(#glow)" filter="url(#shadow)"/>
  <!-- Brand text -->
  <text x="256" y="420" font-family="Arial Black, Impact, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6" opacity="0.95">ON</text>
  <text x="256" y="475" font-family="Arial Black, Impact, sans-serif" font-size="40" font-weight="900" fill="#e50914" text-anchor="middle" letter-spacing="8">STREAM</text>
</svg>
